<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字营销解决方案 - 专业广告技术服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background-color: #232f3e;
            color: white;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff9900;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ff9900;
        }

        .hero {
            background-color: #232f3e;
            color: white;
            padding: 4rem 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            margin: 0 auto;
        }

        .features {
            padding: 4rem 0;
            background-color: white;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .feature-card {
            padding: 2rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            color: #232f3e;
            margin-bottom: 1rem;
        }

        .partners {
            padding: 4rem 0;
            background-color: #f9f9f9;
            text-align: center;
        }

        .partners h2 {
            margin-bottom: 2rem;
            color: #232f3e;
        }

        .partner-badge {
            display: inline-block;
            background-color: #232f3e;
            color: #ff9900;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: bold;
            margin: 0.5rem;
        }

        footer {
            background-color: #232f3e;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }

        footer a {
            color: #ff9900;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-links {
            margin-top: 1rem;
        }

        .footer-links a {
            margin: 0 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">诺桥电商科技有限公司</div>
            <nav>
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="privacy-policy.html">隐私政策</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>专业数字营销解决方案</h1>
            <p>我们提供全方位的广告技术服务，帮助企业实现精准营销，提升品牌影响力</p>
        </div>
    </section>

    <section class="features">
        <div class="container">
            <h2 style="text-align: center; color: #232f3e;">我们的服务</h2>
            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">📊</div>
                    <h3>数据分析</h3>
                    <p>深度数据分析与洞察，助力精准决策</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🎯</div>
                    <h3>精准投放</h3>
                    <p>基于用户画像的精准广告投放服务</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">📈</div>
                    <h3>效果优化</h3>
                    <p>持续优化广告效果，提升ROI</p>
                </div>
            </div>
        </div>
    </section>

    <section class="partners">
        <div class="container">
            <h2>合作伙伴</h2>
            <div class="partner-badge">亚马逊广告合作伙伴</div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 诺桥电商科技有限公司. 保留所有权利。</p>
            <div class="footer-links">
                <a href="privacy-policy.html">隐私政策</a>
                <a href="#">服务条款</a>
                <a href="#">联系我们</a>
            </div>
        </div>
    </footer>
</body>
</html>
